<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - BEY IG DM BOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #292929;
      --border: #3c3c3c;
      --text: #f5f5f5;
      --text-muted: #b8b8b8;
      --primary: #D89B02;
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, #D89B02 0%, #f0ba2f 55%, #d18d00 100%);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Manrope', sans-serif; }

    body {
      position: relative;
      isolation: isolate;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      color: var(--text);
      background:
        radial-gradient(900px 500px at -20% -15%, rgba(216,155,2,0.26), transparent 60%),
        radial-gradient(900px 500px at 120% 110%, rgba(41,41,41,0.45), transparent 60%),
        linear-gradient(160deg, #000000 0%, #090909 45%, #131313 100%);
      padding: calc(1rem + var(--safe-top)) calc(1rem + var(--safe-right)) calc(1rem + var(--safe-bottom)) calc(1rem + var(--safe-left));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(216, 155, 2, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(216, 155, 2, 0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.36;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20% -10%;
      pointer-events: none;
      background:
        radial-gradient(55% 45% at 18% 12%, rgba(216, 155, 2, 0.2), transparent 72%),
        radial-gradient(50% 45% at 82% 88%, rgba(216, 155, 2, 0.14), transparent 74%);
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      overflow: hidden;
      width: min(430px, 100%);
      background: linear-gradient(160deg, rgba(41, 41, 41, 0.97), rgba(11, 11, 11, 0.98));
      border: 1px solid rgba(216, 155, 2, 0.32);
      border-radius: 16px;
      padding: 1.6rem;
      box-shadow: 0 20px 55px -30px rgba(0, 0, 0, 0.85), 0 0 0 1px rgba(216, 155, 2, 0.08);
    }

    .shell::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 800;
      font-size: 1.05rem;
      margin-bottom: 1.2rem;
      letter-spacing: 0.2px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 1.35rem;
      margin-bottom: 0.35rem;
      color: var(--text);
    }

    p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.3rem;
    }

    .group { margin-bottom: 0.95rem; }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: #101010;
      border-radius: 10px;
      padding: 0.72rem 0.78rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(216, 155, 2, 0.25);
    }

    .btn {
      margin-top: 0.25rem;
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #f0ba2f);
      color: #111;
      font-weight: 700;
      font-size: 0.92rem;
      padding: 0.78rem 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .error {
      margin-bottom: 0.85rem;
      font-size: 0.85rem;
      color: #f3c24d;
      border: 1px solid rgba(216, 155, 2, 0.45);
      background: rgba(216, 155, 2, 0.12);
      border-radius: 8px;
      padding: 0.62rem 0.75rem;
    }

    .hint {
      margin-top: 0.95rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    @supports (-webkit-touch-callout: none) {
      body { min-height: -webkit-fill-available; }
    }

    @media (max-width: 520px) {
      body {
        place-items: end center;
        padding: calc(0.65rem + var(--safe-top)) calc(0.65rem + var(--safe-right)) calc(0.65rem + var(--safe-bottom)) calc(0.65rem + var(--safe-left));
      }

      .shell {
        width: 100%;
        border-radius: 12px;
        padding: 1.1rem;
      }

      h1 { font-size: 1.2rem; }
      p { font-size: 0.86rem; margin-bottom: 1.05rem; }
      input, .btn { min-height: 44px; }
      .btn { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <form class="shell" method="POST" action="/login" autocomplete="off">
    <div class="brand">BEY IG DM BOT</div>
    <h1>Sign in</h1>
    <p>Authentication is required to access the control panel.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <div class="group">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required>
    </div>

    <div class="group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
    </div>

    <button class="btn" type="submit">Log In</button>
    <div class="hint">Authorized users only</div>
  </form>
</body>
</html>
