<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BEY IG DM BOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1b263a;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #93a4bc;
      --primary: #3b82f6;
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Manrope', sans-serif; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      background:
        radial-gradient(900px 500px at -20% -15%, rgba(59,130,246,0.26), transparent 60%),
        radial-gradient(900px 500px at 120% 110%, rgba(16,185,129,0.18), transparent 60%),
        var(--bg);
      padding: 1rem;
    }

    .shell {
      width: min(430px, 100%);
      background: linear-gradient(180deg, rgba(27, 38, 58, 0.97), rgba(19, 27, 42, 0.98));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.6rem;
      box-shadow: 0 20px 55px -30px rgba(0, 0, 0, 0.8);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 800;
      font-size: 1.05rem;
      margin-bottom: 1.2rem;
      letter-spacing: 0.2px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 1.35rem;
      margin-bottom: 0.35rem;
      color: var(--text);
    }

    p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.3rem;
    }

    .group { margin-bottom: 0.95rem; }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: #0f172a;
      border-radius: 10px;
      padding: 0.72rem 0.78rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    .btn {
      margin-top: 0.25rem;
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: white;
      font-weight: 700;
      font-size: 0.92rem;
      padding: 0.78rem 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .error {
      margin-bottom: 0.85rem;
      font-size: 0.85rem;
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.35);
      background: rgba(127, 29, 29, 0.25);
      border-radius: 8px;
      padding: 0.62rem 0.75rem;
    }

    .hint {
      margin-top: 0.95rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <form class="shell" method="POST" action="/login" autocomplete="off">
    <div class="brand">BEY IG DM BOT</div>
    <h1>Sign in</h1>
    <p>Authentication is required to access the control panel.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <div class="group">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required>
    </div>

    <div class="group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
    </div>

    <button class="btn" type="submit">Log In</button>
    <div class="hint">Authorized users only</div>
  </form>
</body>
</html>
